# MCPGate Configuration
# Full reference: https://github.com/mprezz/mcpgate#configuration

gateway:
  name: "my-mcpgate"
  transport: "stdio" # stdio | http | both
  port: 3000
  toolPrefix: true
  # auth:
  #   token: "${MCPGATE_AUTH_TOKEN}"

servers:
  # Stdio server — MCPGate spawns the process
  - name: "github"
    transport: "stdio"
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-github"]
    env:
      GITHUB_TOKEN: "${GITHUB_TOKEN}"
    tools:
      # Allowlist: only these tools are exposed (mutually exclusive with block)
      allow:
        - "create_issue"
        - "search_repos"
        - "list_issues"

  # Another stdio server — no filtering (all tools exposed)
  - name: "filesystem"
    transport: "stdio"
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-filesystem", "/home/user/projects"]
    tools:
      # Blocklist: all tools EXCEPT these are exposed
      block:
        - "write_file"
        - "delete_file"

  # Remote HTTP server — MCPGate connects as an MCP client over Streamable HTTP
  # - name: "remote-api"
  #   transport: "http"
  #   url: "https://my-remote-mcp.example.com/mcp"
  #   headers:
  #     Authorization: "Bearer ${API_TOKEN}"
  #   tools:
  #     block:
  #       - "dangerous_operation"

logging:
  level: "info"
